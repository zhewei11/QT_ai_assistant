<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical ECG Monitoring Dashboard</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            background-color: #0b0b0d; /* Extremely deep dark gray */
            color: #ffffff;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- Top Layout Grid --- */
        .top-bar {
            display: flex;
            height: 160px;
            padding: 15px;
            gap: 15px;
            flex-shrink: 0;
        }

        .card {
            background-color: #1a1a1c;
            border: 1px solid #2a2a2d;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }   

        .hr-card {
            flex: 0 0 250px;
        }

        .ar-card {
            flex: 1;
        }

        .status-card {
            flex: 0 0 300px;
            text-align: right;
            align-items: flex-end;
            justify-content: flex-end;
            padding: 15px;
            border: 1px solid #000;
            background-color: #050505;
        }

        /* --- Typography & Elements inside Cards --- */
        .card-header {
            font-size: 1rem;
            color: #aaaaaa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .card-value {
            font-size: 3.5rem;
            font-weight: bold;
            color: #00ff66;
            line-height: 1;
            text-shadow: 0px 0px 10px rgba(0, 255, 102, 0.4);
        }

        .ar-card .card-value {
            font-size: 2.5rem;
        }

        .progress-bar-wrap {
            display: flex;
            width: 80%;
            gap: 5px;
            margin-top: 10px;
        }

        .pb-segment {
            flex: 1;
            height: 35px;
            background-color: #2a2a2d;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 0.7rem;
            color: #666;
            line-height: 1.2;
        }

        .pb-active {
            background-color: #28a745;
            color: #fff;
            box-shadow: 0 0 10px rgba(40, 167, 69, 0.5);
        }

        .ar-status {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #28a745;
        }

        .sys-msg {
            color: #00ff66;
            font-size: 0.85rem;
        }

        /* --- Plot Area --- */
        .plot-container {
            flex: 1;
            margin: 0 15px;
            border: 1px solid #333;
            background-color: #111111;
            position: relative;
            overflow: hidden;
            display: flex;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* --- Bottom Layout --- */
        .bottom-bar {
            height: 80px;
            padding: 15px;
            display: flex;
            gap: 15px;
            flex-shrink: 0;
            justify-content: flex-end;
            margin-top: auto;
        }

        .btn {
            border: none;
            border-radius: 5px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-red {
            background-color: #d32f2f;
            flex: 1;
            box-shadow: 0 4px 6px rgba(211, 47, 47, 0.4);
        }
        
        .btn-red:active { background-color: #b71c1c; }

        .btn-green {
            background-color: #2e7d32;
            flex: 0 0 250px;
            box-shadow: 0 4px 6px rgba(46, 125, 50, 0.4);
        }

        .btn-green:active { background-color: #1b5e20; }

    </style>
</head>

<body>

    <div class="top-bar">
        <div class="card hr-card">
            <div class="card-header">HEART RATE (BPM)</div>
            <div class="card-value" id="bpmDisplay">--</div>
        </div>
        
        <div class="card ar-card">
            <div class="card-header" style="display: flex; align-items: baseline; gap: 15px;">
                <span>ARRHYTHMIA RATIO (60s)</span>
                <span style="font-size: 0.85rem; color: #28a745; text-transform: none; font-weight: 500;">Classification: Normal (Low Risk)</span>
            </div>
            <div class="card-value">0.0%</div>
            <div class="progress-bar-wrap">
                <div class="pb-segment pb-active">
                    <b>< 25%</b>
                    <span>Normal</span>
                </div>
                <div class="pb-segment">
                    <b>25-50%</b>
                    <span>Warning</span>
                </div>
                <div class="pb-segment">
                    <b>> 50%</b>
                    <span>Danger</span>
                </div>
            </div>
        </div>
    </div>

    <div class="plot-container">
        <!-- Overlay canvas system for extreme performance (Background grid vs Foreground line) -->
        <canvas id="bgCanvas" style="position:absolute; z-index: 1;"></canvas>
        <canvas id="ecgCanvas" style="position:absolute; z-index: 2;"></canvas>
    </div>

    <div class="bottom-bar">
        <button id="btnStop" class="btn btn-red">■ STOP MONITORING</button>
        <button id="btnReset" class="btn btn-green">↺ RETEST (Reset 60s)</button>
    </div>

    <script>
        const bgCanvas = document.getElementById('bgCanvas');
        const bgCtx = bgCanvas.getContext('2d', { alpha: false });
        const canvas = document.getElementById('ecgCanvas');
        const ctx = canvas.getContext('2d');
        const bpmDisplay = document.getElementById('bpmDisplay');

        // Target settings
        const FS = 240; // 240Hz matching Python Decimation
        const WINDOW_SECONDS = 4.0; // Draw 4.0 seconds of history (slows visual scrolling speed by half)
        const MAX_POINTS = FS * WINDOW_SECONDS; // 960 points

        let dataBuffer = new Array(MAX_POINTS).fill(0); // rolling array
        let displayScale = 0.08; // Y-range constraint match to your image (0.08 to -0.06)
        let isMonitoring = true;

        /* ================= Button Controls ================= */
        const btnStop = document.getElementById('btnStop');
        const btnReset = document.getElementById('btnReset');

        btnStop.addEventListener('click', () => {
            isMonitoring = !isMonitoring;
            if (isMonitoring) {
                btnStop.innerHTML = "■ STOP MONITORING";
                btnStop.className = "btn btn-red";
            } else {
                btnStop.innerHTML = "▶ RESUME MONITORING";
                btnStop.className = "btn btn-green";
            }
        });

        btnReset.addEventListener('click', () => {
            dataBuffer.fill(0);
            bpmDisplay.innerText = "--";
            // Quick visual flashing feedback
            btnReset.style.transform = "scale(0.95)";
            setTimeout(() => btnReset.style.transform = "scale(1)", 100);
        });

        /* ================= WebSocket Connection ================= */
        const wsUrl = "ws://" + window.location.hostname + ":8000";
        const ws = new WebSocket(wsUrl);

        ws.onopen = () => {
            console.log("WebSocket connected.");
        };

        ws.onmessage = (event) => {
            if (!isMonitoring) return; // Freeze visualization immediately if stopped
            
            const msg = JSON.parse(event.data);
            if (msg.batch) {
                // Shift data array left, push new elements to the right (like a treadmill)
                for (let i = 0; i < msg.batch.length; i++) {
                    dataBuffer.shift();
                    dataBuffer.push(msg.batch[i]);
                }
            }
            if (msg.bpm !== undefined) {
                bpmDisplay.innerText = msg.bpm;
            }
        };

        ws.onclose = () => {
            console.log("WebSocket disconnected.");
        };

        /* ================= Render & Layout Logic ================= */
        function resize() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            bgCanvas.width = canvas.width;
            bgCanvas.height = canvas.height;
            
            drawStaticGrid();
        }
        window.addEventListener('resize', resize);
        
        function drawStaticGrid() {
            bgCtx.fillStyle = '#111111';
            bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
            
            bgCtx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            bgCtx.lineWidth = 1;
            
            // Minor grid lines (every 20x20 pixels)
            bgCtx.beginPath();
            for(let x = 0; x < bgCanvas.width; x += 15) {
                bgCtx.moveTo(x, 0); bgCtx.lineTo(x, bgCanvas.height);
            }
            for(let y = 0; y < bgCanvas.height; y += 15) {
                bgCtx.moveTo(0, y); bgCtx.lineTo(bgCanvas.width, y);
            }
            bgCtx.stroke();

            // Major Grid & Labels
            bgCtx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
            bgCtx.fillStyle = '#666';
            bgCtx.font = '10px Roboto, sans-serif';
            bgCtx.textBaseline = 'middle';
            
            // X-Axis (Time)
            const numXDivisions = 10;
            const xStep = bgCanvas.width / numXDivisions;
            for(let i=0; i<=numXDivisions; i++) {
                let x = i * xStep;
                bgCtx.beginPath(); bgCtx.moveTo(x, 0); bgCtx.lineTo(x, bgCanvas.height); bgCtx.stroke();
                
                // Labels from -2.0 to 0.0
                if (i > 0) {
                    let timeLabel = (-WINDOW_SECONDS + (i * (WINDOW_SECONDS/numXDivisions))).toFixed(1);
                    if (i === numXDivisions) timeLabel = "0";
                    bgCtx.textAlign = 'center';
                    bgCtx.fillText(timeLabel, x, bgCanvas.height - 10);
                }
            }

            // Y-Axis (Amplitude)
            const yRangeTop = 0.08;
            const yRangeBot = -0.06;
            const yTotal = yRangeTop - yRangeBot; // 0.14
            
            const numYDivisions = 7;
            const yStep = bgCanvas.height / numYDivisions;
            bgCtx.textAlign = 'right';
            
            for(let i=0; i<=numYDivisions; i++) {
                let y = i * yStep;
                bgCtx.beginPath(); bgCtx.moveTo(0, y); bgCtx.lineTo(bgCanvas.width, y); bgCtx.stroke();
                
                let val = (yRangeTop - (i * (yTotal/numYDivisions))).toFixed(2);
                bgCtx.fillText(val, 30, y === 0 ? 10 : y);
            }
        }

        function drawECG() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Settings mapping
            const yRangeTop = 0.08;
            const yRangeBot = -0.06;
            const yTotal = yRangeTop - yRangeBot;
            
            // We want to map `idx=0` to `x=0`, and `idx=MAX_POINTS` to `canvas.width`
            const xStride = canvas.width / (MAX_POINTS - 1);
            
            ctx.beginPath();
            let peakIndices = [];
            
            // Plot the line
            for (let i = 0; i < MAX_POINTS; i++) {
                let val = dataBuffer[i];
                
                // Track visual peaks strictly in the frontend display for red dots
                // Simple condition: highest point in a small local window
                if(i > 10 && i < MAX_POINTS - 10) {
                    if (val > 0.015) { // Ensure it's a prominent R peak
                        let isLocalMax = true;
                        for(let j = -8; j <= 8; j++) {
                            if (dataBuffer[i+j] > val) { isLocalMax = false; break; }
                        }
                        if (isLocalMax) peakIndices.push(i);
                    }
                }

                // Map value to Y coordinates
                // yRatio = 0 at top (0.08), 1 at bottom (-0.06)
                let yRatio = (yRangeTop - val) / yTotal;
                let yPos = yRatio * canvas.height;
                let xPos = i * xStride;

                if (i === 0) {
                    ctx.moveTo(xPos, yPos);
                } else {
                    ctx.lineTo(xPos, yPos);
                }
            }
            
            // Stroke line
            ctx.strokeStyle = '#4db6ac'; // Subtle clinical green
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // Draw Red Peaks over the rendered line
            ctx.fillStyle = '#ff3333';
            for (let i = 0; i < peakIndices.length; i++) {
                let idx = peakIndices[i];
                let val = dataBuffer[idx];
                let yRatio = (yRangeTop - val) / yTotal;
                let yPos = yRatio * canvas.height;
                let xPos = idx * xStride;

                ctx.beginPath();
                ctx.arc(xPos, yPos, 4, 0, Math.PI * 2);
                ctx.fill();
            }

            requestAnimationFrame(drawECG);
        }

        // Boot
        resize();
        requestAnimationFrame(drawECG);

    </script>
</body>
</html>
